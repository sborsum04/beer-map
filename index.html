<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Barfly — Beer Map</title>
<style>

/* ─────────────────────────────────────────────────────────────
   BARFLY DESIGN TOKENS
   Light and dark mode both defined from the root.
───────────────────────────────────────────────────────────── */
:root {
  --bg:          #f9fafb;
  --bg2:         #f3f4f6;
  --bg3:         #e5e7eb;
  --text:        #111827;
  --text2:       #6b7280;
  --text3:       #9ca3af;
  --border:      rgba(0,0,0,0.08);
  --borderB:     rgba(0,0,0,0.15);
  --panel:       #ffffff;
  --amber:       #d97706;
  --amberL:      #fef3c7;
  --blue:        #3b82f6;
  --blueD:       #1d4ed8;
  --green:       #10b981;
  --greenD:      #065f46;
  --greenL:      #d1fae5;
  --map-empty:   #e5e7eb;
  --map-avail:   #bfdbfe;
  --map-started: #3b82f6;
  --map-done:    #10b981;
  --city-dot:    #f59e0b;
  --header-h:    52px;
  --panel-w:     368px;
  --r:           10px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg:          #0f172a;
    --bg2:         #1e293b;
    --bg3:         #334155;
    --text:        #f1f5f9;
    --text2:       #94a3b8;
    --text3:       #475569;
    --border:      rgba(255,255,255,0.07);
    --borderB:     rgba(255,255,255,0.14);
    --panel:       #1e293b;
    --amber:       #f59e0b;
    --amberL:      #1c1200;
    --blue:        #60a5fa;
    --blueD:       #3b82f6;
    --green:       #34d399;
    --greenD:      #059669;
    --greenL:      #064e3b;
    --map-empty:   #1e293b;
    --map-avail:   #172554;
    --map-started: #2563eb;
    --map-done:    #059669;
    --city-dot:    #f59e0b;
  }
}

/* ─────────────────────────────────────────────────────────────
   RESET
───────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ─────────────────────────────────────────────────────────────
   APP SHELL
───────────────────────────────────────────────────────────── */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* ─────────────────────────────────────────────────────────────
   HEADER
───────────────────────────────────────────────────────────── */
#hdr {
  height: var(--header-h);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  z-index: 40;
}

#logo {
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.5px;
  color: var(--text);
}

#logo span {
  color: var(--amber);
}

#tabs {
  display: flex;
  gap: 2px;
  background: var(--bg3);
  border-radius: 8px;
  padding: 3px;
}

.tab {
  font-size: 13px;
  font-weight: 500;
  padding: 5px 14px;
  border: none;
  border-radius: 6px;
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  white-space: nowrap;
}

.tab.on {
  background: var(--panel);
  color: var(--text);
  box-shadow: 0 1px 4px rgba(0,0,0,0.10);
}

#stat {
  font-size: 12px;
  color: var(--text3);
  min-width: 80px;
  text-align: right;
}

/* ─────────────────────────────────────────────────────────────
   MAP AREA
───────────────────────────────────────────────────────────── */
#mapwrap {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: var(--bg2);
}

#mapsvg {
  width: 100%;
  height: 100%;
  display: block;
}

/* ─────────────────────────────────────────────────────────────
   MAP ELEMENTS — fills set by JS, these handle hover/cursor
───────────────────────────────────────────────────────────── */
.region {
  stroke: var(--bg);
  stroke-width: 0.5px;
  cursor: default;
  transition: fill 0.3s ease, opacity 0.15s;
}

.region.has-data {
  cursor: pointer;
}

.region.has-data:hover {
  opacity: 0.75;
}

.city-dot {
  stroke: var(--bg);
  stroke-width: 1.5px;
  cursor: pointer;
  transition: fill 0.3s ease;
}

.city-dot:hover {
  opacity: 0.75;
}

.city-label {
  font-size: 9px;
  fill: var(--text2);
  pointer-events: none;
  user-select: none;
}

/* ─────────────────────────────────────────────────────────────
   LEGEND
───────────────────────────────────────────────────────────── */
#legend {
  position: absolute;
  bottom: 16px;
  left: 16px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 10px 14px;
  display: flex;
  flex-direction: column;
  gap: 7px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.10);
}

.lg-row {
  display: flex;
  align-items: center;
  gap: 9px;
  font-size: 11px;
  color: var(--text2);
}

.lg-dot {
  width: 11px;
  height: 11px;
  border-radius: 3px;
  flex-shrink: 0;
}

/* ─────────────────────────────────────────────────────────────
   HINT OVERLAY
───────────────────────────────────────────────────────────── */
#hint {
  position: absolute;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 6px 16px;
  font-size: 12px;
  color: var(--text2);
  pointer-events: none;
  white-space: nowrap;
  transition: opacity 0.4s;
  z-index: 5;
}

#hint.hidden {
  opacity: 0;
}

/* ─────────────────────────────────────────────────────────────
   PANEL — Desktop: right sidebar
───────────────────────────────────────────────────────────── */
#panel {
  position: absolute;
  right: 0;
  top: 0;
  bottom: 0;
  width: var(--panel-w);
  background: var(--panel);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  transform: translateX(100%);
  transition: transform 0.32s cubic-bezier(0.22, 1, 0.36, 1);
  z-index: 20;
  overflow: hidden;
}

#panel.open {
  transform: translateX(0);
}

/* ─────────────────────────────────────────────────────────────
   PANEL — Mobile: bottom sheet
───────────────────────────────────────────────────────────── */
@media (max-width: 680px) {
  #panel {
    top: auto;
    left: 0;
    right: 0;
    bottom: 0;
    width: 100%;
    height: 74vh;
    border-left: none;
    border-top: 1px solid var(--border);
    border-radius: 16px 16px 0 0;
    transform: translateY(100%);
  }

  #panel.open {
    transform: translateY(0);
  }

  #legend {
    display: none;
  }

  /* Drag handle on mobile */
  #panel-handle {
    display: block;
  }
}

#panel-handle {
  display: none;
  width: 36px;
  height: 4px;
  background: var(--borderB);
  border-radius: 2px;
  margin: 10px auto 0;
  flex-shrink: 0;
}

/* ─────────────────────────────────────────────────────────────
   PANEL HEADER
───────────────────────────────────────────────────────────── */
#ph {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  padding: 14px 16px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

#ph-name {
  font-size: 20px;
  font-weight: 700;
  line-height: 1.2;
  color: var(--text);
}

#ph-sub {
  font-size: 12px;
  color: var(--text2);
  margin-top: 3px;
}

#ph-close {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--bg3);
  border: none;
  cursor: pointer;
  color: var(--text2);
  font-size: 14px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s;
}

#ph-close:hover {
  background: var(--borderB);
  color: var(--text);
}

/* ─────────────────────────────────────────────────────────────
   COMPLETION BANNER
───────────────────────────────────────────────────────────── */
#banner {
  display: none;
  margin: 8px 16px 0;
  padding: 9px 14px;
  background: var(--greenL);
  color: #064e3b;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  text-align: center;
  flex-shrink: 0;
}

@media (prefers-color-scheme: dark) {
  #banner { color: #6ee7b7; }
}

/* ─────────────────────────────────────────────────────────────
   PROGRESS BAR
───────────────────────────────────────────────────────────── */
#prog-wrap {
  padding: 10px 16px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

#prog-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

#prog-label {
  font-size: 11px;
  color: var(--text2);
}

#top3-label {
  font-size: 11px;
  color: var(--text2);
  display: flex;
  gap: 4px;
  align-items: center;
}

.t3-pip {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  border: 1.5px solid var(--borderB);
  background: transparent;
  display: inline-block;
  transition: background 0.2s, border-color 0.2s;
}

.t3-pip.done {
  background: var(--green);
  border-color: var(--green);
}

#prog-track {
  height: 4px;
  border-radius: 2px;
  background: var(--bg3);
  overflow: hidden;
}

#prog-fill {
  height: 100%;
  border-radius: 2px;
  background: var(--blue);
  width: 0%;
  transition: width 0.35s ease, background 0.35s ease;
}

/* ─────────────────────────────────────────────────────────────
   BEER LIST
───────────────────────────────────────────────────────────── */
#blist {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.beer-row {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 11px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.1s;
  -webkit-tap-highlight-color: transparent;
}

.beer-row:hover {
  background: var(--bg2);
}

.beer-row:last-child {
  border-bottom: none;
}

.beer-row.tried {
  background: var(--bg2);
}

.beer-row.tried .beer-name {
  text-decoration: line-through;
  color: var(--text3);
}

/* ─────────────────────────────────────────────────────────────
   RANKING BADGE — Gold / Silver / Bronze / Number
───────────────────────────────────────────────────────────── */
.rank-badge {
  width: 26px;
  height: 26px;
  border-radius: 7px;
  font-size: 11px;
  font-weight: 800;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.rank-1 { background: #fef3c7; color: #78350f; }
.rank-2 { background: #f1f5f9; color: #334155; }
.rank-3 { background: #fef9c3; color: #713f12; }
.rank-n { background: var(--bg3); color: var(--text3); font-size: 10px; }

@media (prefers-color-scheme: dark) {
  .rank-1 { background: #1c1200; color: #fbbf24; }
  .rank-2 { background: #1e293b; color: #94a3b8; }
  .rank-3 { background: #1a1000; color: #d97706; }
}

/* ─────────────────────────────────────────────────────────────
   BEER INFO
───────────────────────────────────────────────────────────── */
.beer-info {
  flex: 1;
  min-width: 0;
}

.beer-name {
  font-size: 13.5px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: color 0.15s;
}

.beer-meta {
  font-size: 11px;
  color: var(--text2);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.beer-score {
  font-size: 11px;
  font-weight: 700;
  color: var(--text2);
  background: var(--bg3);
  padding: 3px 7px;
  border-radius: 5px;
  flex-shrink: 0;
  white-space: nowrap;
}

/* ─────────────────────────────────────────────────────────────
   CHECKBOX
───────────────────────────────────────────────────────────── */
.beer-check {
  width: 22px;
  height: 22px;
  border-radius: 6px;
  border: 2px solid var(--borderB);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  color: transparent;
  font-size: 11px;
  font-weight: 900;
  transition: background 0.2s, border-color 0.2s, color 0.2s;
}

.beer-row.tried .beer-check {
  background: var(--green);
  border-color: var(--green);
  color: white;
}

/* ─────────────────────────────────────────────────────────────
   BACKDROP (mobile only)
───────────────────────────────────────────────────────────── */
#backdrop {
  display: none;
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.4);
  z-index: 15;
}

#backdrop.show {
  display: block;
}

@media (min-width: 681px) {
  #backdrop {
    display: none !important;
  }
}

/* ─────────────────────────────────────────────────────────────
   SCROLLBAR STYLING
───────────────────────────────────────────────────────────── */
#blist::-webkit-scrollbar { width: 4px; }
#blist::-webkit-scrollbar-track { background: transparent; }
#blist::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 2px; }

</style>
</head>
<body>

<div id="app">

  <!-- ── HEADER ─────────────────────────────────────────── -->
  <header id="hdr">
    <span id="logo">bar<span>fly</span></span>
    <div id="tabs">
      <button class="tab on" id="btn-world" onclick="setView('world')">World</button>
      <button class="tab"    id="btn-us"    onclick="setView('us')">US States</button>
    </div>
    <span id="stat">0 visited</span>
  </header>

  <!-- ── MAP AREA ──────────────────────────────────────── -->
  <div id="mapwrap">
    <svg id="mapsvg"></svg>

    <div id="hint">Highlighted regions have beers — click to explore</div>

    <div id="legend">
      <div class="lg-row"><div class="lg-dot" style="background:var(--map-avail)"></div>Beers logged</div>
      <div class="lg-row"><div class="lg-dot" style="background:var(--map-started)"></div>Some tried</div>
      <div class="lg-row"><div class="lg-dot" style="background:var(--map-done)"></div>Top 3 complete</div>
      <div class="lg-row"><div class="lg-dot" style="background:var(--city-dot);border-radius:50%"></div>City</div>
    </div>

    <!-- ── PANEL ──────────────────────────────────────── -->
    <div id="panel">
      <div id="panel-handle"></div>

      <div id="ph">
        <div>
          <div id="ph-name">–</div>
          <div id="ph-sub">–</div>
        </div>
        <button id="ph-close" onclick="closePanel()" aria-label="Close panel">✕</button>
      </div>

      <div id="banner">All top 3 beers tried — this location is complete.</div>

      <div id="prog-wrap">
        <div id="prog-row">
          <span id="prog-label">0 / 0 tried</span>
          <span id="top3-label">
            Top 3:
            <span class="t3-pip" id="pip0"></span>
            <span class="t3-pip" id="pip1"></span>
            <span class="t3-pip" id="pip2"></span>
          </span>
        </div>
        <div id="prog-track">
          <div id="prog-fill"></div>
        </div>
      </div>

      <div id="blist"></div>
    </div>

    <div id="backdrop" onclick="closePanel()"></div>
  </div>

</div>

<!-- D3 + TopoJSON from CDN — works in any browser, no install needed -->

<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>

//
//    { name: "Beer Name", brewery: "Brewery Name", style: "Style", abv: 5.5, score: 4.2 },
//
//  To REMOVE a beer, delete its line.

//  The TOP 3 by score are the beers that turn a location GREEN when all tried.

//  HOW TO ADD A COUNTRY
//  ─────────────────────
//  Add a new entry inside DB.countries. The key MUST exactly match the
//  country name from the world-atlas topology (Natural Earth names).
//  If a country isn't highlighting, open the browser console: you'll see
//  "No DB match:" followed by the exact name you need to use.
//  Common names: "Czechia", "United States of America", "South Korea",
//                "Côte d'Ivoire", "eSwatini"
//
//  HOW TO ADD A US STATE
//  ──────────────────────
//  Add inside DB.states using the full state name ("New York", not "NY").
//
//  HOW TO ADD A CITY
//  ──────────────────
//  Add inside DB.cities. Set isUS: true for US cities (shown on US States
//  view) or isUS: false for international cities (shown on World view).
//  Find coordinates by Googling "[City Name] coordinates".
//  Format:
//    "City Name": { lat: 51.5074, lon: -0.1278, isUS: false, beers: [ ... ] },
//
// ═══════════════════════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════════════════════
//  STATE MANAGEMENT
// ═══════════════════════════════════════════════════════════════════════════

let tried = {};          // "locationKey::beerName" → true
let currentView = 'world';
let panelKey     = null;
let panelSection = null;

const STORAGE_KEY = 'barfly_v1';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) tried = JSON.parse(raw);
  } catch (e) { tried = {}; }
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(tried)); } catch (e) {}
}

function triedKey(loc, beer)  { return loc + '::' + beer; }
function isTried(loc, beer)   { return tried[triedKey(loc, beer)] === true; }

function toggleTried(loc, beer) {
  const k = triedKey(loc, beer);
  if (tried[k]) delete tried[k]; else tried[k] = true;
  saveState();
}

// ═══════════════════════════════════════════════════════════════════════════
//  STATUS — the four states that drive map color
// ═══════════════════════════════════════════════════════════════════════════
//  'none'      → location not in DB
//  'available' → in DB, zero beers tried
//  'started'   → 1+ beers tried, but not all top 3
//  'complete'  → all top 3 (by score) tried

function getStatus(key, section) {
  const loc = DB[section][key];
  if (!loc || !loc.beers.length) return 'none';

  const anyTried = loc.beers.some(b => isTried(key, b.name));
  if (!anyTried) return 'available';

  const top3 = [...loc.beers]
    .sort((a, b) => b.score - a.score)
    .slice(0, Math.min(3, loc.beers.length));

  return top3.every(b => isTried(key, b.name)) ? 'complete' : 'started';
}

// Dark-mode-aware fill colors for SVG (CSS vars don't work in SVG fill attrs)
function isDark() { return window.matchMedia('(prefers-color-scheme: dark)').matches; }

function regionFill(status) {
  const d = isDark();
  switch (status) {
    case 'available': return d ? '#1e3554' : '#bfdbfe';
    case 'started':   return d ? '#2563eb' : '#3b82f6';
    case 'complete':  return d ? '#065f46' : '#10b981';
    default:          return d ? '#1e293b' : '#e5e7eb';
  }
}

function cityFill(status) {
  const d = isDark();
  switch (status) {
    case 'started':  return d ? '#2563eb' : '#3b82f6';
    case 'complete': return d ? '#065f46' : '#10b981';
    default:         return '#f59e0b';
  }
}

function countVisited() {
  const locs = new Set(Object.keys(tried).map(k => k.split('::')[0]));
  return locs.size;
}

// ═══════════════════════════════════════════════════════════════════════════
//  MAP RENDERING
// ═══════════════════════════════════════════════════════════════════════════

const svg = d3.select('#mapsvg');
const topoCache = {};  // prevent re-fetching on resize / tab switch

async function fetchTopo(url) {
  if (!topoCache[url]) topoCache[url] = await fetch(url).then(r => r.json());
  return topoCache[url];
}

async function drawMap() {
  const wrap = document.getElementById('mapwrap');
  const W = wrap.clientWidth;
  const H = wrap.clientHeight;

  svg.selectAll('*').remove();
  svg.attr('viewBox', `0 0 ${W} ${H}`);

  if (currentView === 'world') await drawWorld(W, H);
  else await drawUS(W, H);

  updateStats();
}

async function drawWorld(W, H) {
  const world = await fetchTopo('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
  const features = topojson.feature(world, world.objects.countries).features;
  const proj = d3.geoNaturalEarth1().fitSize([W, H], { type: 'FeatureCollection', features });
  const path = d3.geoPath().projection(proj);

  // Country paths
  svg.selectAll('path.region')
    .data(features)
    .join('path')
    .attr('class', d => {
      const inDB = !!DB.countries[d.properties.name];
      return 'region' + (inDB ? ' has-data' : '');
    })
    .attr('d', path)
    .attr('fill', d => regionFill(getStatus(d.properties.name, 'countries')))
    .attr('data-key', d => d.properties.name)
    .attr('data-sec', 'countries')
    .on('click', (_, d) => {
      const name = d.properties.name;
      if (DB.countries[name]) {
        openPanel(name, 'countries');
      } else {
        // Dev helper: log topology name for unmatched regions
        console.log('No DB match:', name);
      }
    });

  // International city dots
  Object.entries(DB.cities)
    .filter(([, c]) => !c.isUS)
    .forEach(([name, city]) => {
      const coords = proj([city.lon, city.lat]);
      if (!coords) return;
      const [cx, cy] = coords;
      const status = getStatus(name, 'cities');

      svg.append('circle')
        .attr('class', 'city-dot')
        .attr('cx', cx).attr('cy', cy).attr('r', 5)
        .attr('fill', cityFill(status))
        .attr('data-key', name)
        .attr('data-sec', 'cities')
        .on('click', () => openPanel(name, 'cities'));

      svg.append('text')
        .attr('class', 'city-label')
        .attr('x', cx + 7).attr('y', cy + 4)
        .text(name);
    });
}

async function drawUS(W, H) {
  const us = await fetchTopo('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json');
  const features = topojson.feature(us, us.objects.states).features;
  const proj = d3.geoAlbersUsa().fitSize([W, H], { type: 'FeatureCollection', features });
  const path = d3.geoPath().projection(proj);

  // State paths
  svg.selectAll('path.region')
    .data(features)
    .join('path')
    .attr('class', d => {
      const inDB = !!DB.states[d.properties.name];
      return 'region' + (inDB ? ' has-data' : '');
    })
    .attr('d', path)
    .attr('fill', d => regionFill(getStatus(d.properties.name, 'states')))
    .attr('data-key', d => d.properties.name)
    .attr('data-sec', 'states')
    .on('click', (_, d) => {
      if (DB.states[d.properties.name]) openPanel(d.properties.name, 'states');
    });

  // US city dots
  Object.entries(DB.cities)
    .filter(([, c]) => c.isUS)
    .forEach(([name, city]) => {
      const coords = proj([city.lon, city.lat]);
      if (!coords) return;
      const [cx, cy] = coords;
      const status = getStatus(name, 'cities');

      svg.append('circle')
        .attr('class', 'city-dot')
        .attr('cx', cx).attr('cy', cy).attr('r', 5)
        .attr('fill', cityFill(status))
        .attr('data-key', name)
        .attr('data-sec', 'cities')
        .on('click', () => openPanel(name, 'cities'));

      svg.append('text')
        .attr('class', 'city-label')
        .attr('x', cx + 7).attr('y', cy + 4)
        .text(name.split(',')[0]);
    });
}

// Refresh all colors on the current map without full redraw
function refreshMapColors() {
  svg.selectAll('[data-key][data-sec]').each(function() {
    const key = this.getAttribute('data-key');
    const sec = this.getAttribute('data-sec');
    const status = getStatus(key, sec);
    const el = d3.select(this);
    el.attr('fill', this.tagName === 'circle' ? cityFill(status) : regionFill(status));
  });
}

// ═══════════════════════════════════════════════════════════════════════════
//  VIEW SWITCHING
// ═══════════════════════════════════════════════════════════════════════════

function setView(v) {
  currentView = v;
  document.getElementById('btn-world').classList.toggle('on', v === 'world');
  document.getElementById('btn-us').classList.toggle('on', v === 'us');
  closePanel(false); // close silently, no animation needed
  drawMap();
}

// ═══════════════════════════════════════════════════════════════════════════
//  PANEL
// ═══════════════════════════════════════════════════════════════════════════

function openPanel(key, section) {
  panelKey     = key;
  panelSection = section;

  // Dismiss hint after first interaction
  document.getElementById('hint').classList.add('hidden');

  document.getElementById('panel').classList.add('open');
  document.getElementById('backdrop').classList.add('show');

  renderPanel();
}

function closePanel(animate = true) {
  panelKey     = null;
  panelSection = null;
  document.getElementById('panel').classList.remove('open');
  document.getElementById('backdrop').classList.remove('show');
}

function renderPanel() {
  if (!panelKey || !panelSection) return;

  const loc  = DB[panelSection][panelKey];
  const type = panelSection === 'countries' ? 'Country' :
               panelSection === 'states'    ? 'US State' : 'City';

  // Sort beers by score descending
  const sorted = [...loc.beers].sort((a, b) => b.score - a.score);
  const top3   = sorted.slice(0, Math.min(3, sorted.length));
  const total  = sorted.length;
  const triedCount = sorted.filter(b => isTried(panelKey, b.name)).length;

  // Header
  document.getElementById('ph-name').textContent = panelKey;
  document.getElementById('ph-sub').textContent  = `${type} · ${total} beer${total !== 1 ? 's' : ''} logged`;

  // Progress bar
  const pct = total > 0 ? (triedCount / total) * 100 : 0;
  document.getElementById('prog-label').textContent = `${triedCount} / ${total} tried`;
  document.getElementById('prog-fill').style.width = pct + '%';

  const isComplete = top3.every(b => isTried(panelKey, b.name));
  document.getElementById('prog-fill').style.background = isComplete ? '#10b981' : '#3b82f6';

  // Completion banner
  document.getElementById('banner').style.display = isComplete ? 'block' : 'none';

  // Top 3 pips
  for (let i = 0; i < 3; i++) {
    const pip = document.getElementById('pip' + i);
    const beer = top3[i];
    pip.classList.toggle('done', !!beer && isTried(panelKey, beer.name));
    pip.style.display = beer ? '' : 'none';
  }

  // Beer list
  const blist = document.getElementById('blist');
  blist.innerHTML = '';

  sorted.forEach((beer, i) => {
    const isTr = isTried(panelKey, beer.name);
    const row  = document.createElement('div');
    row.className = 'beer-row' + (isTr ? ' tried' : '');
    row.setAttribute('data-beer', beer.name);

    // Rank badge
    const badge = document.createElement('div');
    badge.className = 'rank-badge ' + (i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : 'rank-n');
    badge.textContent = i + 1;
    row.appendChild(badge);

    // Info block
    const info = document.createElement('div');
    info.className = 'beer-info';

    const name = document.createElement('div');
    name.className = 'beer-name';
    name.textContent = beer.name;
    info.appendChild(name);

    const meta = document.createElement('div');
    meta.className = 'beer-meta';
    meta.textContent = `${beer.brewery} · ${beer.style} · ${beer.abv}%`;
    info.appendChild(meta);

    row.appendChild(info);

    // Score
    const score = document.createElement('div');
    score.className = 'beer-score';
    score.textContent = beer.score.toFixed(1);
    row.appendChild(score);

    // Checkbox
    const chk = document.createElement('div');
    chk.className = 'beer-check';
    chk.textContent = isTr ? '✓' : '';
    row.appendChild(chk);

    // Toggle on click
    row.addEventListener('click', () => {
      toggleTried(panelKey, beer.name);
      refreshMapColors();
      updateStats();
      renderPanel(); // re-render panel to update progress
    });

    blist.appendChild(row);
  });
}

// ═══════════════════════════════════════════════════════════════════════════
//  STATS
// ═══════════════════════════════════════════════════════════════════════════

function updateStats() {
  const n = countVisited();
  document.getElementById('stat').textContent = n === 0 ? '0 visited' : `${n} visited`;
}

// ═══════════════════════════════════════════════════════════════════════════
//  RESIZE — debounced, uses cached topology
// ═══════════════════════════════════════════════════════════════════════════

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(drawMap, 180);
});

// Re-apply colors when system color scheme changes (dark/light switch)
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
  refreshMapColors();
});

// ═══════════════════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════════════════

loadState();
drawMap();
</script>
